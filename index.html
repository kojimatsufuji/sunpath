<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>ソラミチ — 太陽の軌跡マップ</title>
<meta name="apple-mobile-web-app-title" content="ソラミチ">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0b0c0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" href="icons/icon-192.png">
<link rel="stylesheet" href="vendor/leaflet/leaflet.css">
<style>
  :root{
    --panel: rgba(17,18,22,.82);
    --hairline: rgba(255,255,255,.08);
    --text: #F4F5F7;
    --sub: #9AA0AA;
    --amber: #FFB020;
    --orange: #FF7A1A;
    --red: #FF6B6B;
    --blue: #4DA3FF;
    --green: #4ADE80;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body{ margin:0; height:100%; overflow:hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Noto Sans JP", sans-serif; }
  #map{ position:fixed; inset:0; background:#0b0c0f; }

  /* ---- 上部バー ---- */
  .topbar{
    position:fixed; top:0; left:0; right:0; z-index:1000;
    display:flex; justify-content:space-between; align-items:center;
    padding: calc(env(safe-area-inset-top) + 12px) 14px 0;
    pointer-events:none;
  }
  .topbar > *{ pointer-events:auto; }
  /* 案G「シネ・インストゥルメント」：円形ガラスのアイコンボタン（検索・地図切替・現在地・AR）
     背景が衛星写真（暗い）でも標準地図（明るい）でも視認できるよう、常に暗めのガラス地にする */
  .pill{
    width:34px; height:34px; border-radius:50%; flex:none;
    display:flex; align-items:center; justify-content:center;
    background:linear-gradient(180deg, rgba(22,24,30,.62), rgba(9,10,14,.62));
    border:1px solid rgba(255,255,255,.16);
    box-shadow:0 8px 20px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.16);
    backdrop-filter:blur(14px) saturate(150%); -webkit-backdrop-filter:blur(14px) saturate(150%);
    color:#F4F0E6; font-size:10px; font-weight:700; letter-spacing:.06em;
    cursor:pointer; user-select:none;
  }
  .pill svg{ width:15px; height:15px; display:block; }
  .pill.wide{ width:auto; padding:0 16px; border-radius:999px; font-size:11px; }
  button.pill:active{ filter:brightness(1.3); }
  /* ブランド（ソラミチ）ボタン：ガラスのピル＋光る太陽ドット。タップで情報ダイアログを開く */
  .brand{
    display:inline-flex; align-items:center; gap:7px;
    background:linear-gradient(180deg, rgba(22,24,30,.62), rgba(9,10,14,.62));
    border:1px solid rgba(255,255,255,.18); border-radius:999px;
    color:#F8F5EE; font-weight:700; letter-spacing:.06em; font-size:12px; line-height:1;
    padding:8px 14px 8px 12px; cursor:pointer; user-select:none;
    box-shadow:0 8px 20px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.16);
    backdrop-filter:blur(14px) saturate(150%); -webkit-backdrop-filter:blur(14px) saturate(150%);
    text-shadow:0 1px 4px rgba(0,0,0,.5);
  }
  .brand .brand-dot{ width:6px; height:6px; border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #FFE2A6, #FFB020 70%);
    box-shadow:0 0 6px rgba(255,176,32,.9), 0 0 14px rgba(255,176,32,.45); flex:none; }
  .brand:active{ filter:brightness(.82); }
  .top-actions{ display:flex; align-items:center; gap:8px; }

  /* アプリ情報の全画面ダイアログ */
  .about{ position:fixed; inset:0; z-index:2000; background:rgba(8,9,12,.97);
    backdrop-filter:blur(22px); -webkit-backdrop-filter:blur(22px);
    display:flex; align-items:center; justify-content:center; color:var(--text);
    padding:40px 24px calc(env(safe-area-inset-bottom) + 24px);
    opacity:0; transition:opacity .2s ease; }          /* 退場（既定）= 速くフェードアウト */
  .about.open{ opacity:1; transition:opacity .34s ease; } /* 入場 = ややゆっくりフェードイン */
  .about[hidden]{ display:none; }
  .about-x{ position:absolute; top:calc(env(safe-area-inset-top) + 12px); right:16px;
    width:42px; height:42px; border-radius:50%; background:rgba(255,255,255,.08);
    border:none; color:var(--text); font-size:24px; line-height:1; cursor:pointer; }
  .about-body{ width:100%; max-width:330px; text-align:center; }
  .about-icon{ width:88px; height:88px; border-radius:20px; border:1px solid var(--hairline); display:block; margin:0 auto 18px; }
  .about-name{ font-size:26px; font-weight:700; letter-spacing:.06em; }
  .about-tag{ font-size:14px; color:var(--sub); margin:4px 0 28px; }
  .about-row{ display:flex; justify-content:space-between; align-items:center; gap:12px;
    padding:14px 2px; border-top:1px solid var(--hairline); font-size:14px; text-align:left; }
  .about-row:last-child{ border-bottom:1px solid var(--hairline); }
  .about-row > span{ color:var(--sub); flex:none; }
  .about-row > b{ font-weight:600; }
  .about-row a{ color:var(--blue); text-decoration:none; word-break:break-all; }
  /* ソラミチ画面の「購入を復元」（ネイティブで常設。Webでは hidden のまま） */
  .about-restore{ display:block; width:100%; margin-top:26px; padding:13px;
    border-radius:12px; border:1px solid var(--hairline); background:rgba(255,255,255,.06);
    color:var(--text); font-size:15px; font-weight:600; cursor:pointer;
    -webkit-tap-highlight-color:transparent; }
  .about-restore[hidden]{ display:none; }
  /* 情報ダイアログの開閉トランジション（入場=ゆっくり＋スタッガー / 退場=速い）。
     既定（.open なし）に退場用の短い transition を置き、.open 側に入場用の長い transition＋遅延を上書きする。 */
  .about-body{ opacity:0; transform:scale(.96);
    transition:opacity .16s ease, transform .16s ease; }
  .about.open .about-body{ opacity:1; transform:none;
    transition:opacity .3s ease, transform .45s cubic-bezier(.16,1,.3,1); }
  .about-icon, .about-name, .about-tag, .about-row, .about-restore, .about-x{
    opacity:0; transition:opacity .16s ease, transform .16s ease; }
  .about-icon{ transform:translateY(10px) scale(.84); }
  .about-name, .about-tag, .about-row, .about-restore{ transform:translateY(12px); }
  .about-x{ transform:scale(.8); }
  .about.open .about-icon,
  .about.open .about-name,
  .about.open .about-tag,
  .about.open .about-row,
  .about.open .about-restore,
  .about.open .about-x{ opacity:1; transform:none; }
  /* 入場のスタッガー（中身が下から順にせり上がる）。アイコンは軽くオーバーシュートさせて“ポップ” */
  .about.open .about-icon{ transition:opacity .5s ease .06s, transform .6s cubic-bezier(.2,.8,.2,1.12) .06s; }
  .about.open .about-name{ transition:opacity .45s ease .14s, transform .55s cubic-bezier(.16,1,.3,1) .14s; }
  .about.open .about-tag { transition:opacity .45s ease .18s, transform .55s cubic-bezier(.16,1,.3,1) .18s; }
  .about.open .about-row:nth-child(4){ transition:opacity .45s ease .22s, transform .55s cubic-bezier(.16,1,.3,1) .22s; }
  .about.open .about-row:nth-child(5){ transition:opacity .45s ease .27s, transform .55s cubic-bezier(.16,1,.3,1) .27s; }
  .about.open .about-row:nth-child(6){ transition:opacity .45s ease .32s, transform .55s cubic-bezier(.16,1,.3,1) .32s; }
  .about.open .about-restore{ transition:opacity .45s ease .37s, transform .55s cubic-bezier(.16,1,.3,1) .37s; }
  .about.open .about-x{ transition:opacity .4s ease .2s, transform .4s ease .2s; }
  @media (prefers-reduced-motion: reduce){
    .about, .about.open, .about-body, .about.open .about-body,
    .about-icon, .about-name, .about-tag, .about-row, .about-x,
    .about.open .about-icon, .about.open .about-name, .about.open .about-tag,
    .about.open .about-row, .about.open .about-x{
      transition-duration:.01ms !important; transition-delay:0s !important; }
  }

  /* ---- 検索ボックス ---- */
  .searchbox{
    position:fixed; top:calc(env(safe-area-inset-top) + 58px);
    left:50%; transform:translateX(-50%);
    width:min(92vw, 420px); z-index:1001;
    background:var(--panel); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
    border:1px solid var(--hairline); border-radius:16px;
    padding:10px; color-scheme:dark;
  }
  .searchbox input{
    width:100%; background:rgba(255,255,255,.06); border:1px solid var(--hairline);
    /* font-size は16px以上にする（iOSは16px未満の入力欄でフォーカス時に画面を自動拡大するため） */
    border-radius:10px; color:var(--text); font:inherit; font-size:16px;
    padding:10px 12px; outline:none;
  }
  .search-results{ max-height:40vh; overflow-y:auto; }
  .result{
    color:var(--text); font-size:12.5px; line-height:1.5;
    padding:10px 8px; border-top:1px solid var(--hairline);
    margin-top:8px; cursor:pointer; border-radius:8px;
  }
  .result:first-child{ border-top:none; }
  .result:active{ background:rgba(255,255,255,.07); }
  .result.sub{ color:var(--sub); cursor:default; }

  /* ---- 下部ガラスパネル ---- */
  .sheet{
    position:fixed; left:12px; right:12px;
    bottom: calc(env(safe-area-inset-bottom) + 12px);
    /* iOS Safariはfixed要素を大ビューポート基準で配置するため、
       ツールバー表示中は (100lvh - 100svh) 分だけ持ち上げて常に見える位置に置く */
    bottom: calc(100lvh - 100svh + env(safe-area-inset-bottom) + 12px);
    z-index:1000; max-width:520px; margin:0 auto;
    background:linear-gradient(176deg, rgba(20,23,32,.76) 0%, rgba(7,9,14,.91) 100%);
    backdrop-filter:blur(20px) saturate(155%); -webkit-backdrop-filter:blur(20px) saturate(155%);
    border:1px solid rgba(255,255,255,.10); border-radius:22px;
    box-shadow:0 24px 58px rgba(0,0,0,.55), 0 4px 12px rgba(0,0,0,.4);
    padding:14px 16px; color:var(--text);
    color-scheme: dark;
  }
  .sheet::before{
    content:""; position:absolute; left:16px; right:16px; top:0; height:1px;
    background:linear-gradient(90deg, rgba(255,255,255,0), rgba(255,255,255,.22) 30%, rgba(255,255,255,.22) 70%, rgba(255,255,255,0));
  }
  .row{ display:flex; align-items:center; gap:8px; }
  .row + .row{ margin-top:12px; }

  .chip{
    display:inline-flex; align-items:center; gap:5px;
    background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.01));
    border:1px solid rgba(255,255,255,.11); border-radius:999px;
    color:rgba(255,255,255,.6); font-size:11px; letter-spacing:.02em; white-space:nowrap;
    padding:8px 13px; cursor:pointer; user-select:none;
  }
  .chip i{ width:6px; height:6px; border-radius:50%; background:var(--c); opacity:.55; }
  .chip.on{
    color:#FFF3E0; border-color:var(--c);
    background:linear-gradient(180deg, var(--cg), transparent);
    box-shadow:0 0 14px var(--cg), inset 0 1px 0 rgba(255,255,255,.18);
  }
  .chip.on i{ opacity:1; box-shadow:0 0 5px var(--c); }

  .daterow{ justify-content:space-between; }
  .stepper{ display:flex; gap:6px; align-items:center; flex:1; }
  .step-btn{
    width:26px; height:26px; border-radius:50%; flex:none;
    border:1px solid rgba(255,255,255,.16);
    background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,0));
    color:rgba(255,255,255,.68); font-size:13px; line-height:24px; text-align:center; cursor:pointer;
  }
  .step-btn:active{ filter:brightness(1.4); }
  .datewrap{
    position:relative; flex:1 1 0px; width:0; min-width:0; display:flex;
  }
  /* 表示は自前のテキスト（日付＋曜日を並べられる）。日付部品は透明で上に重ね、タップでカレンダーを開く */
  .datedisp{
    flex:1 1 0px; width:0; min-width:0;
    border:1px solid rgba(255,255,255,.14); border-radius:999px;
    background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.01));
    color:#F4EEE3; font-size:14px; font-weight:600; text-align:center;
    padding:7px 10px; font-variant-numeric:tabular-nums; letter-spacing:.02em; white-space:nowrap;
    overflow:hidden; font-family:"DIN Alternate", -apple-system, sans-serif;
  }
  .datedisp .dow{ color:rgba(255,214,150,.85); margin-left:6px; font-size:11px; font-weight:500; font-family:-apple-system,"Hiragino Sans",sans-serif; }
  input[type="date"]{
    position:absolute; inset:0; width:100%; height:100%;
    opacity:0; -webkit-appearance:none; appearance:none;
    border:0; margin:0; padding:0; font:inherit;
  }
  .today-btn{
    border:1px solid rgba(255,255,255,.16);
    background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,0));
    color:rgba(255,255,255,.78); font-size:11px; font-weight:600; letter-spacing:.02em;
    border-radius:999px; padding:8px 13px; cursor:pointer;
    flex-shrink:0;
  }
  .today-btn:active{ filter:brightness(1.4); }
  .sheet{ overflow:hidden; }  /* 万一のはみ出しは角丸内でクリップ */

  /* ---- 下部デッキ 新要素（タイムコード・方位高度・24hバー・主要3時刻） ---- */
  .din{ font-family:"DIN Alternate", -apple-system, sans-serif; font-variant-numeric:tabular-nums; letter-spacing:.02em; }
  .deck-divider{ height:1px; margin:13px 0 12px; background:var(--hairline); }
  .deck-top{ display:flex; flex-direction:column; gap:9px; margin-bottom:14px; }
  .deck-tc{ display:flex; align-items:baseline; gap:10px; flex-wrap:wrap; }
  .deck-tcnum{ font-size:22px; font-weight:700; line-height:1; color:var(--text); text-shadow:0 0 18px rgba(255,190,90,.2); }
  .deck-tcst{ font-size:11px; color:var(--sub); }
  .deck-tcaz{ margin-left:auto; font-size:11px; color:rgba(255,255,255,.55); white-space:nowrap; }
  .deck-mh{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .deck-mhk{ display:inline-flex; align-items:center; gap:5px; font-size:9px; letter-spacing:.1em; color:rgba(255,196,107,.85); }
  .deck-mhk i{ width:5px; height:5px; border-radius:50%; background:var(--amber); box-shadow:0 0 4px 1px rgba(255,190,80,.9); }
  .deck-mhv{ font-size:11.5px; font-weight:600; color:#FFC46B; }
  .deck-mhv em{ font-style:normal; font-size:9px; font-weight:500; color:rgba(255,220,170,.65); margin-right:3px; }

  .deck-band{ position:relative; height:26px; margin:0 0 6px; border-radius:7px; overflow:hidden;
    background:linear-gradient(90deg,
      #05070B 0%, #0B0F18 12%, #6E3560 18%, #E8A45A 20.6%, #D9C79B 24%,
      #C7D4DC 40%, #E7EEF3 49%, #D3C6A4 58%, #ED8F3E 76.7%, #472247 84%, #05070B 100%);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.2), inset 0 -8px 14px rgba(0,0,0,.4); }
  .deck-seg{ position:absolute; top:0; bottom:0; border-radius:3px;
    background:linear-gradient(180deg, rgba(255,214,130,.55), rgba(255,176,32,.28));
    box-shadow:0 0 6px 1px rgba(255,196,90,.85), 0 0 16px 4px rgba(255,176,32,.4); opacity:0; }
  .deck-mark{ position:absolute; top:-4px; bottom:-4px; width:1.5px; border-radius:1px; transform:translateX(-50%); opacity:0; }
  .deck-mark.sr{ background:#FFC46B; box-shadow:0 0 6px rgba(255,196,107,.9); }
  .deck-mark.nn{ background:rgba(240,247,252,.95); box-shadow:0 0 6px rgba(234,242,247,.8); }
  .deck-mark.ss{ background:#FF9840; box-shadow:0 0 6px rgba(255,152,64,.9); }
  .deck-playhead{ position:absolute; top:-9px; bottom:-7px; width:2.2px; border-radius:1px; transform:translateX(-50%);
    background:linear-gradient(180deg,#B7FFD6,#4ADE80);
    box-shadow:0 0 6px 1.5px rgba(74,222,128,1), 0 0 16px 5px rgba(74,222,128,.6); opacity:0; }
  .deck-scan{ position:absolute; top:-4px; bottom:-4px; width:3px; border-radius:2px; transform:translateX(-50%);
    background:linear-gradient(180deg,#EAFFF3,#4ADE80);
    box-shadow:0 0 12px 4px rgba(74,222,128,.85); opacity:0; left:0; }
  .deck-ruler{ display:flex; justify-content:space-between; margin:0 1px 14px; font-size:7.5px; letter-spacing:0; color:rgba(255,255,255,.36); }
  .deck-ruler span{ flex:1; text-align:center; }
  .deck-ruler span:first-child{ text-align:left; }
  .deck-ruler span:last-child{ text-align:right; }
  .deck-ruler span.maj{ color:rgba(255,255,255,.56); font-weight:600; }

  .deck-keytimes{ display:flex; justify-content:space-between; padding:0 2px; }
  .deck-kt{ display:flex; flex-direction:column; gap:2px; }
  .deck-kt.mid{ text-align:center; align-items:center; }
  .deck-kt.end{ text-align:right; align-items:flex-end; }
  .deck-kl{ font-size:9px; letter-spacing:.1em; color:var(--sub); }
  .deck-kv{ font-size:19px; font-weight:700; color:var(--text); }

  /* ---- 地図上のマーカー ---- */
  /* 時刻アイコン：背景色は時間帯ごとにJSでインライン指定（朝=ピンク〜昼=クリーム〜夕=オレンジ） */
  .hour-dot{
    width:24px; height:24px; border-radius:50%;
    background:var(--amber); color:#2A1607;
    font-size:11px; font-weight:700;
    display:flex; align-items:center; justify-content:center;
    border:1.5px solid rgba(255,255,255,.9);
    box-shadow:0 1px 6px rgba(0,0,0,.5);
  }
  /* 軌跡アニメで弧に沿って移動する太陽の円（移動ヘッド） */
  .sun-travel{
    width:22px; height:22px; border-radius:50%;
    background:var(--amber); border:2.5px solid #fff;
    box-shadow:0 0 16px 6px rgba(255,176,32,.75);
  }
  /* 現在の太陽アイコン（方位線の先端。光条付き。drawNow()がインラインSVGで生成） */
  .now-sun{ width:26px; height:26px; overflow:visible; }
  .obs-dot{
    width:16px; height:16px; border-radius:50%;
    background:#fff; border:3px solid rgba(17,18,22,.65);
    box-shadow:0 1px 8px rgba(0,0,0,.5);
  }
  /* 現在地（青ドット＋方位ビーム）。青はGoogleマップ等の慣習に合わせた現在地色 */
  .loc-wrap{ position:relative; width:18px; height:18px; }
  .loc-beam{
    position:absolute; left:50%; top:50%; width:92px; height:92px;
    margin-left:-46px; margin-top:-46px;
    transform-origin:50% 50%; border-radius:50%; pointer-events:none;
    background: conic-gradient(from -35deg, rgba(66,133,244,.65) 0deg, rgba(66,133,244,.65) 70deg, transparent 70deg);
    -webkit-mask-image: radial-gradient(circle, rgba(0,0,0,.95) 0%, transparent 66%);
    mask-image: radial-gradient(circle, rgba(0,0,0,.95) 0%, transparent 66%);
    opacity:0; transition:opacity .3s;  /* コンパス取得までは非表示 */
  }
  .loc-dot{
    position:absolute; inset:0; border-radius:50%;
    background:#4285F4; border:2.5px solid #fff;
    box-shadow:0 1px 8px rgba(0,0,0,.5);
  }

  /* ---- ARモード ---- */
  #arView{ position:fixed; inset:0; z-index:2000; background:#000; }
  #arVideo{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
  #arCanvas{ position:absolute; inset:0; width:100%; height:100%; }
  #arExitBtn{
    position:absolute; top:calc(env(safe-area-inset-top) + 12px);
    left:50%; transform:translateX(-50%);
    letter-spacing:.08em; font-weight:700;
  }
  /* コンパスがずれて見えるとき用の手動再調整ボタン（磁気干渉は端末を8の字に振っても直らないことがあるため、
     基準取り直しの手段を用意する） */
  #arRecalBtn{
    position:absolute; top:calc(env(safe-area-inset-top) + 12px);
    right:20px;
  }
  #arRecalBtn svg{ width:16px; height:16px; display:block; }
  #arRecalBtn.spin svg{ animation:ar-recal-spin .6s ease-out; }
  @keyframes ar-recal-spin{ from{ transform:rotate(0deg); } to{ transform:rotate(320deg); } }
  .ar-status{
    position:absolute; bottom:calc(env(safe-area-inset-bottom) + 14px);
    bottom: calc(100lvh - 100svh + env(safe-area-inset-bottom) + 14px);
    left:50%; transform:translateX(-50%);
    background:var(--panel); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
    border:1px solid var(--hairline); border-radius:999px;
    color:var(--text); font-size:12px; padding:9px 16px;
    font-variant-numeric:tabular-nums; white-space:nowrap;
  }

  /* 横向きで開いたときの案内（軌跡の見積もりが縦持ち前提のため、正確な位置合わせができない） */
  .ar-rotate{
    position:absolute; inset:0; z-index:1;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px;
    background:rgba(8,9,12,.82); backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px);
    color:var(--text); pointer-events:none;
  }
  .ar-rotate[hidden]{ display:none; }  /* display:flex が hidden属性を打ち消さないように */
  .ar-rotate svg{ width:40px; height:40px; opacity:.7; animation:ar-rotate-hint 1.8s ease-in-out infinite; }
  .ar-rotate p{ margin:0; font-size:14px; color:var(--sub); }
  @keyframes ar-rotate-hint{
    0%, 100%{ transform:rotate(0deg); }
    50%{ transform:rotate(-90deg); }
  }

  .leaflet-control-attribution{ background:rgba(17,18,22,.6) !important; color:#777 !important; }
  .leaflet-control-attribution a{ color:#999 !important; }

  .toast{
    position:fixed; top:calc(env(safe-area-inset-top) + 64px); left:50%; transform:translateX(-50%);
    z-index:3000; background:var(--panel); backdrop-filter:blur(16px);  /* ソラミチ画面(2000)・AR(2000)より前面に */
    border:1px solid var(--hairline); border-radius:999px;
    color:var(--text); font-size:12px; padding:9px 16px;
    opacity:0; transition:opacity .25s; pointer-events:none; white-space:nowrap;
  }
  .toast.show{ opacity:1; }

  /* ネイティブアプリ専用の「広告を削除」リンク（Webでは非表示のまま） */
  .noads{
    display:block; margin:10px 0 0 auto; padding:4px 2px;
    background:none; border:none; color:var(--sub);
    font-size:11px; text-decoration:underline; cursor:pointer;
  }
  .noads[hidden]{ display:none; }  /* display:block が hidden属性を打ち消さないように */
  .noads-row{ display:flex; justify-content:flex-end; gap:16px; margin-top:6px; }
  .noads-row .noads{ margin:0; }

  /* ---- 狭い画面（スマホ縦持ち）の調整 ----
     元のUI構成（ロゴ表示・「今日へ」は日付の横）のまま、サイズと余白だけ詰めて収める */
  @media (max-width: 520px){
    .topbar{ padding-left:8px; padding-right:8px; }
    .top-actions{ gap:5px; }
    .pill{ width:30px; height:30px; }
    .pill svg{ width:13px; height:13px; }
    .pill.wide{ width:auto; padding:0 13px; }
    .brand{ font-size:11px; letter-spacing:.04em; padding:7px 11px 7px 10px; }
    .sheet{ padding:12px; left:10px; right:10px; }
    .row + .row{ margin-top:10px; }
    .stepper{ gap:4px; }
    .step-btn{ width:24px; height:24px; font-size:12px; line-height:22px; }
    .datedisp{ font-size:12px; padding:7px 6px; }
    .today-btn{ padding:7px 10px; font-size:10.5px; }
  }
</style>
</head>

<script src="vendor/leaflet/leaflet.js"></script>
<script src="vendor/suncalc.js"></script>
<script>
(function(){
  'use strict';

  // ---------- 保存された設定の読み込み ----------
  var saved = {};
  try { saved = JSON.parse(localStorage.getItem('sunpath') || '{}'); } catch(e){}

  // ---------- 状態 ----------
  var state = {
    obs: saved.obs || { lat: 35.6812, lng: 139.7671 },  // 初期値: 東京駅
    date: new Date(),
    show: saved.show || { today: true, summer: false, winter: false },
    satellite: (saved.satellite !== undefined) ? saved.satellite : true
  };
  var RADIUS = 450; // 軌跡の基準半径 [m]

  function save(){
    try {
      localStorage.setItem('sunpath', JSON.stringify({
        obs: state.obs, show: state.show, satellite: state.satellite, zoom: map.getZoom()
      }));
    } catch(e){}
  }

  // ---------- 地図 ----------
  // 衛星写真（Esri World Imagery）は ArcGIS Location Platform のAPIキー認証で取得する。
  // このキーは「公開アプリ用・従量課金オフ（無料枠で停止＝料金リスクなし）」。
  // キーは約1年で期限切れになるため、アプリを毎年作り直さずに済むよう、
  // 起動時にネット上の最新キー(esri-token.txt)を読み込み、取れなければ同梱の予備キーを使う。
  var ESRI_ATTR = 'Powered by <a href="https://www.esri.com/" target="_blank" rel="noopener noreferrer">Esri</a> | Source: Esri, Vantor, GeoEye, Earthstar Geographics, CNES/Airbus DS, USDA, USGS, AeroGRID, IGN, and the GIS User Community';
  // 同梱の予備キー。期限切れ後は下記 esri-token.txt を差し替えるだけで Web・アプリ両方が自動で最新化される。
  var ESRI_TOKEN_FALLBACK = 'AAPTaxnIW1bSN7Za7lejAP5N0tw..JIXoFDJm-3g-4pG0vr2SCX4fmDc7z_HpGP_IfEnw3JYQNjaMRNLgPWpsjGwMFY1M3LXhM7ZTVTnb7t91Qi9IExVVvOdqhhbZ4llNxwNfuLDn6YOoL6rlRM1AIIRp5ix7y4A5R5UlZ9oX6UMy7uFfMneRmYUFrCtSfekNLlsexy8FUiDoqzRiXcmFUWJVzmtfK1PKxcD2UnrM-uTEgskZCZbC_Ol19GAam9pQWh7qsgrxyDqtsN1Vi6RU71wnAT1_4t0IEVNX';
  var ESRI_TOKEN_URL = 'https://kojimatsufuji.github.io/sunpath/esri-token.txt'; // 最新キーの置き場所（期限更新はこのファイルだけ差し替える）
  function esriImageryUrl(token){
    return 'https://ibasemaps-api.arcgis.com/arcgis/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}?token=' + token;
  }

  var map = L.map('map', { zoomControl: false })
    .setView([state.obs.lat, state.obs.lng], saved.zoom || 16);
  var satLayer = L.tileLayer(esriImageryUrl(ESRI_TOKEN_FALLBACK),
    { maxZoom: 19, attribution: ESRI_ATTR });
  var osmLayer = L.tileLayer(
    'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
    { maxZoom: 19, attribution: '© OpenStreetMap contributors' });
  (state.satellite ? satLayer : osmLayer).addTo(map);
  map.on('zoomend', save);

  // 起動時に最新のEsriキーを取得して衛星レイヤーを更新（失敗時は同梱の予備キーのまま動作）
  (function refreshEsriToken(){
    if (!window.fetch) return;
    fetch(ESRI_TOKEN_URL, { cache: 'no-store' })
      .then(function(r){ return r.ok ? r.text() : null; })
      .then(function(t){
        if (!t) return;
        t = t.trim();
        if (t.indexOf('AAP') === 0 && t !== ESRI_TOKEN_FALLBACK){
          satLayer.setUrl(esriImageryUrl(t));  // 新しいキーでタイルを再取得
        }
      })
      .catch(function(){ /* オフライン等 → 同梱キーで続行 */ });
  })();

  var groups = {
    summer: L.layerGroup().addTo(map),
    winter: L.layerGroup().addTo(map),
    today:  L.layerGroup().addTo(map),
    now:    L.layerGroup().addTo(map)
  };

  // 観測点マーカー（ドラッグで移動）
  var obsMarker = L.marker([state.obs.lat, state.obs.lng], {
    draggable: true,
    icon: L.divIcon({ className:'', html:'<div class="obs-dot"></div>', iconSize:[16,16], iconAnchor:[8,8] })
  }).addTo(map);
  obsMarker.on('dragend', function(){
    var p = obsMarker.getLatLng();
    setObserver(p.lat, p.lng, false);
  });
  map.on('click', function(e){ setObserver(e.latlng.lat, e.latlng.lng, false); });

  // ---------- 暖色グラデーション（時刻アイコン・軌跡線・現在方位線で使う） ----------
  function hexLerp(c1, c2, t){
    function h2n(h){ return [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)]; }
    var a = h2n(c1), b = h2n(c2);
    var r = a.map(function(v, i){ return Math.round(v + (b[i] - v) * t); });
    return '#' + r.map(function(v){ return ('0' + v.toString(16)).slice(-2); }).join('');
  }
  // 時刻(0-23の小数)→暖色。朝=ソフトピンク→昼=ほぼ白のクリーム→夕=オレンジ
  var HOUR_COLOR_STOPS = [
    [4, '#FF97A6'], [7, '#FFB37E'], [9, '#FFDDA6'],
    [12, '#FFF6E6'], [15, '#FFDDA0'], [18, '#FF9F5E'], [20, '#F2724A']
  ];
  function hourColorAt(h){
    var s = HOUR_COLOR_STOPS;
    if (h <= s[0][0]) return s[0][1];
    if (h >= s[s.length - 1][0]) return s[s.length - 1][1];
    for (var i = 0; i < s.length - 1; i++){
      if (h >= s[i][0] && h <= s[i + 1][0]) return hexLerp(s[i][1], s[i + 1][1], (h - s[i][0]) / (s[i + 1][0] - s[i][0]));
    }
    return s[s.length - 1][1];
  }
  // 弧上の位置（0=日の出側 〜 1=日の入側）→暖色。軌跡線のグラデーション用
  var FRAC_COLOR_STOPS = [[0, '#FF97A6'], [.2, '#FFB37E'], [.5, '#FFF6E6'], [.8, '#FFBE7F'], [1, '#F2724A']];
  function gradientColorAt(frac){
    var s = FRAC_COLOR_STOPS;
    if (frac <= 0) return s[0][1];
    if (frac >= 1) return s[s.length - 1][1];
    for (var i = 0; i < s.length - 1; i++){
      if (frac >= s[i][0] && frac <= s[i + 1][0]) return hexLerp(s[i][1], s[i + 1][1], (frac - s[i][0]) / (s[i + 1][0] - s[i][0]));
    }
    return s[s.length - 1][1];
  }
  // 太陽アイコン（現在位置。光条付き。地図・ARで共通利用）
  function sunIconSvg(size){
    var r = size / 2;
    return '<svg width="' + size + '" height="' + size + '" viewBox="' + (-r) + ' ' + (-r) + ' ' + size + ' ' + size + '" style="overflow:visible">' +
      '<circle r="' + (r * 0.58) + '" fill="rgba(4,10,7,.45)" style="filter:blur(1.5px)"/>' +
      '<g stroke="#4ADE80" stroke-width="1.8" stroke-linecap="round" opacity=".9">' +
        '<line x1="0" y1="-' + (r*.62) + '" x2="0" y2="-' + (r*1) + '"/>' +
        '<line x1="' + (r*.44) + '" y1="-' + (r*.44) + '" x2="' + (r*.71) + '" y2="-' + (r*.71) + '"/>' +
        '<line x1="' + (r*.62) + '" y1="0" x2="' + (r*1) + '" y2="0"/>' +
        '<line x1="' + (r*.44) + '" y1="' + (r*.44) + '" x2="' + (r*.71) + '" y2="' + (r*.71) + '"/>' +
        '<line x1="0" y1="' + (r*.62) + '" x2="0" y2="' + (r*1) + '"/>' +
        '<line x1="-' + (r*.44) + '" y1="' + (r*.44) + '" x2="-' + (r*.71) + '" y2="' + (r*.71) + '"/>' +
        '<line x1="-' + (r*.62) + '" y1="0" x2="-' + (r*1) + '" y2="0"/>' +
        '<line x1="-' + (r*.44) + '" y1="-' + (r*.44) + '" x2="-' + (r*.71) + '" y2="-' + (r*.71) + '"/>' +
      '</g>' +
      '<circle r="' + (r * 0.5) + '" fill="rgba(74,222,128,.35)" style="filter:blur(2px)"/>' +
      '<circle r="' + (r * 0.32) + '" fill="#6CFFA0" stroke="rgba(6,20,12,.75)" stroke-width="1.5"/>' +
    '</svg>';
  }

  // ---------- 太陽計算ユーティリティ ----------
  function sunAt(d){
    var p = SunCalc.getPosition(d, state.obs.lat, state.obs.lng);
    return {
      azimuth: p.azimuth * 180 / Math.PI + 180,   // 北=0°の方位角に変換
      altitude: p.altitude * 180 / Math.PI
    };
  }
  function dest(bearing, dist){
    var R = 6378137, br = bearing * Math.PI / 180;
    var dLat = dist * Math.cos(br) / R;
    var dLng = dist * Math.sin(br) / (R * Math.cos(state.obs.lat * Math.PI / 180));
    return [state.obs.lat + dLat * 180 / Math.PI, state.obs.lng + dLng * 180 / Math.PI];
  }
  // 高度が低いほど遠くに置く（地平線=RADIUS、天頂=RADIUS*0.18）
  function sunLatLng(s){
    var r = RADIUS * Math.max(0.18, (90 - s.altitude) / 90);
    return dest(s.azimuth, r);
  }
  function fmtTime(d){
    if (!d || isNaN(d.getTime())) return '–';
    return ('0'+d.getHours()).slice(-2) + ':' + ('0'+d.getMinutes()).slice(-2);
  }
  function fmtRange(a, b){
    if (!a || !b || isNaN(a.getTime()) || isNaN(b.getTime())) return '–';
    return fmtTime(a) + '–' + fmtTime(b);
  }
  function dateAtNoon(d){
    var x = new Date(d); x.setHours(12,0,0,0); return x;
  }
  function solsticeDate(kind){
    // 固定近似（実際の至点と±1日ずれる年あり。ロケハン用途では許容）
    var y = state.date.getFullYear();
    return kind === 'summer' ? new Date(y, 5, 21) : new Date(y, 11, 21);
  }

  // ---------- 軌跡の描画（アニメーション付き） ----------
  // 軌跡（5分刻みの点列）と時刻マーカー（弧上での位置インデックス付き）を構築
  function buildArc(baseDate){
    var pts = [], markers = [];
    for (var m = 0; m < 1440; m += 5){
      var d = new Date(baseDate); d.setHours(0, m, 0, 0);
      var s = sunAt(d);
      if (s.altitude > -0.6){
        pts.push(sunLatLng(s));
        if (m % 60 === 0 && s.altitude > 0){
          markers.push({ idx: pts.length - 1, hour: m / 60, latlng: pts[pts.length - 1] });
        }
      }
    }
    return { pts: pts, markers: markers };
  }

  // 軌跡アニメの速度（ms）。小さいほど速い。
  var ANIM_DUR = 600;
  // ease-out の強さ（最初速く→最後ゆっくり）。大きいほど終盤の減速が強い（4=強）
  var EASE_POW = 4;

  // 最初速く・最後ゆっくり（ease-out）。EASE_POW で減速の強さを調整
  function easeOut(t){ return 1 - Math.pow(1 - t, EASE_POW); }

  // 軌跡を「日の出側→日の入側へ描かれていく」アニメで表示。
  // document.hidden（プレビューの非表示タブ・バックグラウンド）では即座に最終状態にする。
  function animateArc(group, arc, dur, makeDrawer){
    group.clearLayers();
    if (arc.pts.length < 2) return;                 // 太陽が昇らない日
    group._anim = (group._anim || 0) + 1;
    var myAnim = group._anim;
    var drawer = makeDrawer(group, arc);
    if (document.hidden){ drawer.set(1); return; }  // 非表示時は即時に最終状態
    var start = null;
    function step(ts){
      if (group._anim !== myAnim) return;           // 後発のredrawに置き換えられたら停止
      if (start === null) start = ts;
      var t = Math.min(1, (ts - start) / dur);
      drawer.set(t < 1 ? easeOut(t) : 1);
      if (t < 1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  }

  // 移動する太陽の円（グロー付き・色は引数で指定）のアイコンを作る
  function glowOf(hex){ var c = hex.replace('#',''); return 'rgba('+parseInt(c.slice(0,2),16)+','+parseInt(c.slice(2,4),16)+','+parseInt(c.slice(4,6),16)+',.75)'; }
  function travelIcon(color){
    return L.divIcon({ className:'', html:'<div class="sun-travel" style="background:'+color+';box-shadow:0 0 16px 6px '+glowOf(color)+'"></div>', iconSize:[22,22], iconAnchor:[11,11] });
  }

  // 今日の軌跡：グロー付きの太陽の円が弧に沿って日の出側→日の入側へ滑らかに移動し、
  // 後ろに暖色グラデーションの線が引かれ、通過した時刻マーカー（時間帯ごとの暖色アイコン）がトレイルとして残る。
  var TODAY_LINE_SEGMENTS = 14; // 線を細かく分割し、区間ごとに暖色を変えて疑似グラデーションにする
  function makeTodayDrawer(){
    return function(group, arc){
      var animating = !document.hidden;            // 表示中のみ移動アニメ（非表示は即時最終状態）
      var total = arc.pts.length;
      var segs = [];
      for (var i = 0; i < TODAY_LINE_SEGMENTS; i++){
        segs.push(L.polyline([], {
          color: gradientColorAt((i + 0.5) / TODAY_LINE_SEGMENTS), weight: 1.8, opacity: 0.95, lineCap: 'round'
        }).addTo(group));
      }
      function setSegs(n){
        for (var i = 0; i < TODAY_LINE_SEGMENTS; i++){
          var lo = Math.floor(total * i / TODAY_LINE_SEGMENTS), hi = Math.ceil(total * (i + 1) / TODAY_LINE_SEGMENTS);
          var from = Math.max(0, Math.min(lo, n)), to = Math.max(0, Math.min(hi, n));
          // 隣接区間と繋がるよう1点分重ねる
          segs[i].setLatLngs(to > from ? arc.pts.slice(Math.max(0, from - (i > 0 ? 1 : 0)), to) : []);
        }
      }
      var added = 0;
      var head = animating ? L.marker(arc.pts[0], { interactive: false, zIndexOffset: 1000,
        icon: travelIcon('#FFB020') }).addTo(group) : null;
      function placeMarkers(n){
        while (added < arc.markers.length && arc.markers[added].idx < n){
          var mk = arc.markers[added++];
          var col = hourColorAt(mk.hour);
          var m = L.marker(mk.latlng, { interactive: false,
            icon: L.divIcon({ className:'', html:'<div class="hour-dot" style="background:'+col+'">'+mk.hour+'</div>', iconSize:[24,24], iconAnchor:[12,12] }) }).addTo(group);
          if (animating){
            var root = m.getElement(); var el = root && root.querySelector('.hour-dot');
            if (el){
              el.style.opacity = '0'; el.style.transform = 'scale(.5)';
              el.style.transition = 'opacity .3s ease, transform .35s cubic-bezier(.2,.8,.2,1.2)';
              (function(e){ requestAnimationFrame(function(){ requestAnimationFrame(function(){ e.style.opacity = '1'; e.style.transform = 'scale(1)'; }); }); })(el);
            }
          }
        }
      }
      return { set: function(t){
        var n = Math.max(2, Math.round(total * t));
        setSegs(n);                                // 線が移動ヘッドの後ろに引かれる（暖色グラデーション）
        if (head) head.setLatLng(arc.pts[n - 1]);  // 太陽の円が弧に沿って移動
        placeMarkers(n);                            // 通過した時刻マーカーをトレイルとして残す
        if (t >= 1 && head){                        // 到達したら移動ヘッドはフェードアウトして消す
          var hr = head; head = null;
          var rootEl = hr.getElement(); var he = rootEl && rootEl.querySelector('.sun-travel');
          if (he){ he.style.transition = 'opacity .35s ease'; he.style.opacity = '0'; setTimeout(function(){ group.removeLayer(hr); }, 420); }
          else group.removeLayer(hr);
        }
      }};
    };
  }

  // 夏至・冬至：その色（夏至=赤／冬至=青）の太陽の円が破線に沿って移動し、後ろに破線（暗色ケーシング＋色線）が伸びる
  function makeDashedDrawer(color){
    return function(group, arc){
      var animating = !document.hidden;
      var casing = L.polyline([], { color: '#0b0c0f', weight: 5.5, opacity: 0.55, dashArray: '2.5 5' }).addTo(group);
      var line   = L.polyline([], { color: color, weight: 2.4, opacity: 1, dashArray: '2.5 5' }).addTo(group);
      var head = animating ? L.marker(arc.pts[0], { interactive: false, zIndexOffset: 1000, icon: travelIcon(color) }).addTo(group) : null;
      return { set: function(t){
        var n = Math.max(2, Math.round(arc.pts.length * t));
        var sub = arc.pts.slice(0, n); casing.setLatLngs(sub); line.setLatLngs(sub);
        if (head) head.setLatLng(arc.pts[n - 1]);
        if (t >= 1 && head){
          var hr = head; head = null;
          var rootEl = hr.getElement(); var he = rootEl && rootEl.querySelector('.sun-travel');
          if (he){ he.style.transition = 'opacity .35s ease'; he.style.opacity = '0'; setTimeout(function(){ group.removeLayer(hr); }, 420); }
          else group.removeLayer(hr);
        }
      }};
    };
  }

  // 現在の太陽（方位線＋太陽アイコン）— 選択日に関係なく「実際の今」を表示。
  // 方位線はグリーンのグラデーション（観測点側は深緑→太陽アイコン側は明るい緑）。
  var NOW_LINE_SEGMENTS = 8;
  var NOW_LINE_STOPS = ['#1F8A56', '#4ADE80'];
  function drawNow(){
    groups.now.clearLayers();
    var now = new Date();
    var s = sunAt(now);
    if (s.altitude > -0.6){
      var from = [state.obs.lat, state.obs.lng];
      var to = dest(s.azimuth, RADIUS * 1.3);
      for (var i = 0; i < NOW_LINE_SEGMENTS; i++){
        var t0 = i / NOW_LINE_SEGMENTS, t1 = (i + 1) / NOW_LINE_SEGMENTS;
        var p0 = [from[0] + (to[0]-from[0])*t0, from[1] + (to[1]-from[1])*t0];
        var p1 = [from[0] + (to[0]-from[0])*t1, from[1] + (to[1]-from[1])*t1];
        L.polyline([p0, p1], { color: hexLerp(NOW_LINE_STOPS[0], NOW_LINE_STOPS[1], (t0+t1)/2), weight: 2, opacity: 0.9, lineCap: 'round' }).addTo(groups.now);
      }
      L.marker(sunLatLng(s), {
        interactive: false,
        icon: L.divIcon({ className:'now-sun', html: sunIconSvg(26), iconSize:[26,26], iconAnchor:[13,13] })
      }).addTo(groups.now);
      document.getElementById('vNow').innerHTML =
        '方位 ' + Math.round(s.azimuth) + '° ／ 高度 ' + Math.round(s.altitude) + '°';
    } else {
      document.getElementById('vNow').innerHTML = '太陽は地平線下';
    }
  }

  // ---------- 単一グループの描画／アニメ（トグルや再描画で使う） ----------
  // k のグループだけを描き直す。他のグループには一切触れない（再アニメさせない）。
  function drawGroup(k){
    if (k === 'today'){
      if (state.show.today)  animateArc(groups.today,  buildArc(state.date),             ANIM_DUR, makeTodayDrawer());  else groups.today.clearLayers();
    } else if (k === 'summer'){
      if (state.show.summer) animateArc(groups.summer, buildArc(solsticeDate('summer')), ANIM_DUR, makeDashedDrawer('#FF6B6B')); else groups.summer.clearLayers();
    } else if (k === 'winter'){
      if (state.show.winter) animateArc(groups.winter, buildArc(solsticeDate('winter')), ANIM_DUR, makeDashedDrawer('#4DA3FF')); else groups.winter.clearLayers();
    }
  }

  // ---------- タイムコード（現在時刻・太陽の状態テキスト） ----------
  function updateClock(){
    document.getElementById('tcNum').textContent = fmtTime(new Date());
    var now = new Date();
    var nt = SunCalc.getTimes(now, state.obs.lat, state.obs.lng);
    var text;
    if (!nt.sunrise || isNaN(nt.sunrise.getTime())){ text = '—'; }
    else if (now < nt.dawn){ text = '夜明け前'; }
    else if (now < nt.sunrise){ text = 'まもなく日の出'; }
    else if (now < nt.goldenHourEnd){ text = '朝のマジックアワー'; }
    else if (now < nt.goldenHour){ text = '日中・順光'; }
    else if (now < nt.sunset){ text = '夕方のマジックアワー'; }
    else if (now < nt.dusk){ text = '日没後・薄明'; }
    else { text = '夜'; }
    document.getElementById('tcStatus').textContent = text;
  }

  // ---------- 下部バー（24hタイムライン）：位置計算＋スキャン演出 ----------
  function pctOfDay(d){ return (d.getHours() * 60 + d.getMinutes()) / 1440 * 100; }

  var BAND_ANIM_DUR = 700;
  var bandAnimId = 0;
  function animateBandScan(targetPct, revealEls, playhead, showPlayheadAtEnd){
    bandAnimId++;
    var myAnim = bandAnimId;
    var scan = document.getElementById('deckScan');
    revealEls.forEach(function(el){ el.style.transition = 'none'; el.style.opacity = '0'; });
    playhead.style.transition = 'none'; playhead.style.opacity = '0'; playhead.style.transform = 'translateX(-50%) scaleY(.3)';
    scan.style.transition = 'none'; scan.style.opacity = '1'; scan.style.left = '0%';
    if (document.hidden){                 // 非表示タブでは即座に最終状態
      revealEls.forEach(function(el){ el.style.opacity = '1'; });
      scan.style.opacity = '0';
      if (showPlayheadAtEnd){ playhead.style.opacity = '1'; playhead.style.transform = 'translateX(-50%) scaleY(1)'; }
      return;
    }
    var pulsed = [];
    var start = null;
    function step(ts){
      if (bandAnimId !== myAnim) return;      // 後発のredrawに置き換えられたら停止
      if (start === null) start = ts;
      var raw = Math.min(1, (ts - start) / BAND_ANIM_DUR);
      var t = 1 - Math.pow(1 - raw, 3);
      var pos = targetPct * t;
      scan.style.left = pos + '%';
      revealEls.forEach(function(el, idx){
        var elPct = parseFloat(el.style.left) || 0;
        if (!pulsed[idx] && pos >= elPct){ pulsed[idx] = true; el.style.transition = 'opacity .25s ease'; el.style.opacity = '1'; }
      });
      if (raw < 1) requestAnimationFrame(step);
      else {
        scan.style.transition = 'opacity .25s ease'; scan.style.opacity = '0';
        if (showPlayheadAtEnd){
          // 「コツン」は縦方向(scaleY)のみで動かし、横位置には触れないためズレが起きない
          playhead.style.transition = 'opacity .2s ease, transform .3s cubic-bezier(.34,1.56,.64,1)';
          playhead.style.opacity = '1'; playhead.style.transform = 'translateX(-50%) scaleY(1.5)';
          setTimeout(function(){
            playhead.style.transition = 'transform .25s ease-out';
            playhead.style.transform = 'translateX(-50%) scaleY(1)';
          }, 260);
        }
      }
    }
    requestAnimationFrame(step);
  }

  function updateBand(t, animate){
    var isToday = state.date.toDateString() === new Date().toDateString();
    var pctSR = pctOfDay(t.sunrise), pctGE = pctOfDay(t.goldenHourEnd);
    var pctGH = pctOfDay(t.goldenHour), pctSS = pctOfDay(t.sunset);
    var pctNN = pctOfDay(t.solarNoon);
    var segAM = document.getElementById('segAM'), segPM = document.getElementById('segPM');
    var markSR = document.getElementById('markSR'), markNN = document.getElementById('markNN'), markSS = document.getElementById('markSS');
    var ph = document.getElementById('deckPlayhead');
    segAM.style.left = pctSR + '%'; segAM.style.width = Math.max(0, pctGE - pctSR) + '%';
    segPM.style.left = pctGH + '%'; segPM.style.width = Math.max(0, pctSS - pctGH) + '%';
    markSR.style.left = pctSR + '%'; markNN.style.left = pctNN + '%'; markSS.style.left = pctSS + '%';
    var pctNow = isToday ? pctOfDay(new Date()) : null;
    if (pctNow !== null) ph.style.left = pctNow + '%';

    if (animate){
      animateBandScan(isToday ? pctNow : 100, [segAM, segPM, markSR, markNN, markSS], ph, isToday);
    } else if (isToday){
      ph.style.transition = 'none'; ph.style.opacity = '1'; ph.style.transform = 'translateX(-50%) scaleY(1)';
    } else {
      ph.style.transition = 'none'; ph.style.opacity = '0';
    }
  }

  // ---------- 全体更新（日付・観測点の変更時：表示中の軌跡をすべて描き直す） ----------
  function redraw(){
    drawGroup('today'); drawGroup('summer'); drawGroup('winter');
    drawNow();
    updateClock();

    var t = SunCalc.getTimes(dateAtNoon(state.date), state.obs.lat, state.obs.lng);
    document.getElementById('vSunrise').textContent = fmtTime(t.sunrise);
    document.getElementById('vNoon').textContent    = fmtTime(t.solarNoon);
    document.getElementById('vSunset').textContent  = fmtTime(t.sunset);
    // マジックアワー: 朝=日の出〜GH終了 / 夕=GH開始〜日の入
    document.getElementById('vGHam').textContent = fmtRange(t.sunrise, t.goldenHourEnd);
    document.getElementById('vGHpm').textContent = fmtRange(t.goldenHour, t.sunset);

    updateBand(t, true);   // 24hバー：位置更新＋スキャン演出
  }

  function setObserver(lat, lng, pan){
    state.obs = { lat: lat, lng: lng };
    obsMarker.setLatLng([lat, lng]);
    if (pan) map.setView([lat, lng], Math.max(map.getZoom(), 15));
    redraw();
    save();
  }

  function setDate(d){
    state.date = d;
    var y = d.getFullYear(), mo = ('0'+(d.getMonth()+1)).slice(-2), da = ('0'+d.getDate()).slice(-2);
    document.getElementById('dateInput').value = y + '-' + mo + '-' + da;
    document.getElementById('dateDisp').innerHTML =
      y + '/' + mo + '/' + da +
      '<span class="dow">(' + ['日','月','火','水','木','金','土'][d.getDay()] + ')</span>';
    redraw();
  }

  // ---------- UIイベント ----------
  document.querySelectorAll('.chip').forEach(function(chip){
    var k = chip.dataset.k;
    chip.classList.toggle('on', !!state.show[k]);   // 保存状態を反映
    chip.addEventListener('click', function(){
      state.show[k] = !state.show[k];
      chip.classList.toggle('on', state.show[k]);
      drawGroup(k);   // 押したものだけ描画／消去。他は再アニメさせない
      save();
    });
  });

  document.getElementById('dateInput').addEventListener('change', function(e){
    if (!e.target.value) return;
    var p = e.target.value.split('-');
    setDate(new Date(+p[0], +p[1]-1, +p[2]));
  });
  // デスクトップブラウザでは透明入力のクリックだけでピッカーが開かないため明示的に開く
  document.querySelector('.datewrap').addEventListener('click', function(){
    var input = document.getElementById('dateInput');
    try { if (input.showPicker) input.showPicker(); else input.focus(); }
    catch(err){ input.focus(); }
  });
  document.getElementById('prevDay').addEventListener('click', function(){
    var d = new Date(state.date); d.setDate(d.getDate()-1); setDate(d);
  });
  document.getElementById('nextDay').addEventListener('click', function(){
    var d = new Date(state.date); d.setDate(d.getDate()+1); setDate(d);
  });
  document.getElementById('todayBtn').addEventListener('click', function(){ setDate(new Date()); });

  var layerBtn = document.getElementById('layerBtn');
  layerBtn.setAttribute('aria-label', state.satellite ? '地図に切り替え' : '航空写真に切り替え');
  layerBtn.addEventListener('click', function(){
    state.satellite = !state.satellite;
    if (state.satellite){ map.removeLayer(osmLayer); satLayer.addTo(map); this.setAttribute('aria-label', '地図に切り替え'); }
    else { map.removeLayer(satLayer); osmLayer.addTo(map); this.setAttribute('aria-label', '航空写真に切り替え'); }
    save();
  });

  var toastTimer;
  function toast(msg){
    var el = document.getElementById('toast');
    el.textContent = msg; el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function(){ el.classList.remove('show'); }, 2500);
  }

  // ---------- 現在地トラッキング（青ドット＋方位ビーム） ----------
  // 観測点（白ドット）とは独立して「自分の位置と携帯の向き」を地図上に示す。
  var locMarker = null, locCircle = null, locWatchId = null, locHeading = null;

  function updateLocMarker(lat, lng, acc){
    if (!locMarker){
      locCircle = L.circle([lat, lng], {
        radius: acc || 0, color: '#4285F4', weight: 1, opacity: .25,
        fillColor: '#4285F4', fillOpacity: .08, interactive: false
      }).addTo(map);
      locMarker = L.marker([lat, lng], {
        interactive: false, zIndexOffset: 500,
        icon: L.divIcon({ className:'',
          html:'<div class="loc-wrap"><div class="loc-beam"></div><div class="loc-dot"></div></div>',
          iconSize:[18,18], iconAnchor:[9,9] })
      }).addTo(map);
    } else {
      locMarker.setLatLng([lat, lng]);
      locCircle.setLatLng([lat, lng]).setRadius(acc || 0);
    }
  }

  function onMapOrient(e){
    var h = null;
    if (typeof e.webkitCompassHeading === 'number' && !isNaN(e.webkitCompassHeading)) h = e.webkitCompassHeading;
    else if (e.alpha != null && (e.absolute || e.type === 'deviceorientationabsolute')) h = (360 - e.alpha) % 360;
    if (h === null) return;
    locHeading = lowpassAngle(locHeading, h, 0.25);
    if (locMarker && locMarker.getElement()){
      var beam = locMarker.getElement().querySelector('.loc-beam');
      if (beam){
        beam.style.transform = 'rotate(' + locHeading + 'deg)';
        beam.style.opacity = '1';
      }
    }
  }

  var mapOrientStarted = false;
  function startMapOrient(){
    if (mapOrientStarted) return;
    var ready;
    if (window.DeviceOrientationEvent && typeof DeviceOrientationEvent.requestPermission === 'function'){
      ready = DeviceOrientationEvent.requestPermission().then(function(r){
        if (r !== 'granted') throw new Error('denied');
      });
    } else {
      ready = Promise.resolve();
    }
    ready.then(function(){
      mapOrientStarted = true;
      window.addEventListener('deviceorientationabsolute', onMapOrient);
      window.addEventListener('deviceorientation', onMapOrient);
    }).catch(function(){ /* 許可なし→ビームなしの青ドットのみで続行 */ });
  }

  // 位置情報：ネイティブ(Capacitor)はプラグイン、Webはブラウザ標準APIを使う。
  // ネイティブでは「ソラミチ」名＋日本語説明のOSダイアログが出る（Webの "localhost" 表記にならない）。
  var CapGeo = (window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.Geolocation) || null;
  function geoGetCurrent(onOk, onErr){
    var opts = { enableHighAccuracy: true, timeout: 8000 };
    if (CapGeo){
      var go = function(){ CapGeo.getCurrentPosition(opts).then(onOk).catch(function(e){ if (onErr) onErr(e); }); };
      if (CapGeo.requestPermissions){ CapGeo.requestPermissions().then(go, go); } else { go(); }
    } else if (navigator.geolocation){
      navigator.geolocation.getCurrentPosition(onOk, onErr || function(){}, opts);
    } else if (onErr){ onErr(); }
  }
  function geoWatch(onOk){
    if (CapGeo){ CapGeo.watchPosition({ enableHighAccuracy: true }, function(pos){ if (pos) onOk(pos); }); return true; }
    if (navigator.geolocation){ return navigator.geolocation.watchPosition(function(pos){ onOk(pos); }, function(){}, { enableHighAccuracy: true }); }
    return null;
  }

  function startLocWatch(){
    if (locWatchId !== null) return;
    locWatchId = geoWatch(function(pos){ updateLocMarker(pos.coords.latitude, pos.coords.longitude, pos.coords.accuracy); });
  }

  document.getElementById('locateBtn').addEventListener('click', function(){
    if (!CapGeo && !navigator.geolocation){ toast('この端末では現在地を取得できません'); return; }
    toast('現在地を取得中…');
    startMapOrient();  // ユーザー操作起点でセンサー許可を要求（iOS）
    geoGetCurrent(
      function(pos){
        updateLocMarker(pos.coords.latitude, pos.coords.longitude, pos.coords.accuracy);
        setObserver(pos.coords.latitude, pos.coords.longitude, true);
        startLocWatch();  // 以降は移動に自動追従
        toast('現在地に移動しました');
      },
      function(){ toast('現在地を取得できませんでした'); }
    );
  });

  // ---------- アプリ情報ダイアログ（ソラミチをタップ） ----------
  (function(){
    var aboutBtn = document.getElementById('aboutBtn');
    var about = document.getElementById('about');
    var aboutClose = document.getElementById('aboutClose');
    if (!aboutBtn || !about) return;
    var closeTimer;
    function openAbout(){
      clearTimeout(closeTimer);
      about.hidden = false;            // まず display:flex（中身は opacity:0 の初期状態で描画）
      void about.offsetWidth;          // 初期状態を強制レイアウトで確定 → 同tickで .open を付けても入場トランジションが発火（rAF非依存）
      about.classList.add('open');
    }
    function closeAbout(){
      about.classList.remove('open');  // 退場トランジション開始
      clearTimeout(closeTimer);
      closeTimer = setTimeout(function(){            // 退場アニメ後に display:none へ
        if (!about.classList.contains('open')) about.hidden = true;
      }, 240);
    }
    aboutBtn.addEventListener('click', openAbout);
    if (aboutClose) aboutClose.addEventListener('click', closeAbout);
    about.addEventListener('click', function(e){ if (e.target === about) closeAbout(); }); // 背景タップで閉じる
    var link = about.querySelector('a[target="_blank"]');
    if (link) link.addEventListener('click', function(e){ e.preventDefault(); window.open(link.href, '_blank'); }); // 外部リンクはシステムブラウザで
  })();

  // ---------- 地点検索（Nominatim / OpenStreetMap） ----------
  var searchBox = document.getElementById('searchBox');
  var searchInput = document.getElementById('searchInput');
  var searchResults = document.getElementById('searchResults');

  document.getElementById('searchBtn').addEventListener('click', function(){
    searchBox.hidden = !searchBox.hidden;
    if (!searchBox.hidden) searchInput.focus();
  });
  searchInput.addEventListener('keydown', function(e){
    if (e.key === 'Enter') doSearch(searchInput.value.trim());
  });

  function doSearch(q){
    if (!q) return;
    searchResults.innerHTML = '<div class="result sub">検索中…</div>';
    fetch('https://nominatim.openstreetmap.org/search?format=json&limit=5&accept-language=ja&q=' + encodeURIComponent(q))
      .then(function(r){ return r.json(); })
      .then(function(list){
        if (!list.length){
          searchResults.innerHTML = '<div class="result sub">見つかりませんでした</div>';
          return;
        }
        searchResults.innerHTML = '';
        list.forEach(function(item){
          var div = document.createElement('div');
          div.className = 'result';
          div.textContent = item.display_name;
          div.addEventListener('click', function(){
            setObserver(+item.lat, +item.lon, true);
            searchBox.hidden = true;
            searchResults.innerHTML = '';
            searchInput.value = '';
          });
          searchResults.appendChild(div);
        });
      })
      .catch(function(){
        searchResults.innerHTML = '<div class="result sub">検索に失敗しました（ネット接続を確認）</div>';
      });
  }

  // ---------- ARモード ----------
  // カメラ映像に太陽の位置・軌跡を重畳表示する。
  // 追従はジャイロ統合済みの alpha/beta/gamma（滑らか・ただしiOSでは北の基準が不定）で行い、
  // コンパス（webkitCompassHeading）は「北の基準合わせ」だけに低速で使う。
  // コンパス値を直接描画に使うと、値の跳び（特に端末を上に向けたとき）がそのまま画面の跳びになるため。
  var arView = document.getElementById('arView');
  var arVideo = document.getElementById('arVideo');
  var arCanvas = document.getElementById('arCanvas');
  var arStatus = document.getElementById('arStatus');
  var arRotateNotice = document.getElementById('arRotateNotice');
  var arCtx = arCanvas.getContext('2d');
  var arStream = null, arActive = false, hasAbsolute = false;
  var orient = { heading: null, pitch: null };
  var yawOffset = null; // 相対ヨー→真方位の補正量。コンパスからゆっくり推定する
  var compassPrev = null;  // 直前のコンパスサンプル {v, t}（スパイク検出用）
  var yawLockTime = 0;     // 初回基準が取れた時刻
  var arStartTime = 0;     // ARモード開始時刻
  var AR_VFOV = 65; // スマホカメラの縦視野角の仮定値 [deg]

  function lowpassAngle(prev, next, k){
    if (prev === null) return next;
    var d = ((next - prev + 540) % 360) - 180;
    return (prev + d * k + 360) % 360;
  }

  function onOrient(e){
    if (e.type === 'deviceorientationabsolute') hasAbsolute = true;
    var isCompass = (typeof e.webkitCompassHeading === 'number' && !isNaN(e.webkitCompassHeading));
    if (hasAbsolute && e.type === 'deviceorientation' && !isCompass) return; // Androidの相対イベントは無視
    if (e.alpha == null || e.beta == null || e.gamma == null) return;

    // 回転行列から背面カメラ（端末-z軸）の向きを計算（地上座標: x=東, y=北, z=天頂）
    var D = Math.PI / 180;
    var ca = Math.cos(e.alpha*D), sa = Math.sin(e.alpha*D);
    var cb = Math.cos(e.beta*D),  sb = Math.sin(e.beta*D);
    var cg = Math.cos(e.gamma*D), sg = Math.sin(e.gamma*D);
    var vx = -(ca*sg + sa*sb*cg);
    var vy = -(sa*sg - ca*sb*cg);
    var vz = -(cb*cg);
    var azRel = (Math.atan2(vx, vy) / D + 360) % 360; // 滑らか（ただしiOSでは北の基準が不定）
    var alt = Math.asin(Math.max(-1, Math.min(1, vz))) / D;

    // 北の基準合わせ
    var isAbs = (e.absolute === true || e.type === 'deviceorientationabsolute');
    if (isAbs){
      yawOffset = 0; // Android: alphaが真方位基準なので補正不要
    } else if (isCompass && Math.abs(alt) < 45){
      // iOS: コンパスは「北の基準」の推定だけに使う。
      // センサーイベントは毎秒50〜60回発火するため、イベント単位の固定係数では実質追従が
      // 速すぎてコンパスの乱れが画面に出る（屋内の磁気で数十度揺れる）。
      // → 時間基準の時定数で超低速に補正し、精度の悪いサンプル・スパイクは捨てる。
      var tNow = performance.now();
      var ch = e.webkitCompassHeading;
      var acc = (typeof e.webkitCompassAccuracy === 'number') ? e.webkitCompassAccuracy : -1;
      var accOk = (acc >= 0 && acc <= 25);
      var spike = compassPrev !== null &&
                  Math.abs(((ch - compassPrev.v + 540) % 360) - 180) > 6;
      if (!spike && (accOk || (yawOffset === null && tNow - arStartTime > 6000))){
        // ↑精度情報が取れない端末や磁気の乱れがある場所でも、6秒待って基準が無ければ初回だけ採用する
        // （3秒だと精度の悪いサンプルで基準が固定されやすく、実際より軌跡が大きくずれる原因になっていた）
        var target = ((ch - azRel) % 360 + 360) % 360;
        if (yawOffset === null){
          yawOffset = target;
          yawLockTime = tNow;
        } else {
          var dt = compassPrev ? Math.min(200, tNow - compassPrev.t) / 1000 : 0.02;
          var tau = (tNow - yawLockTime < 3000) ? 0.7 : 15; // 開始3秒は速く収束、以後は時定数15秒
          yawOffset = lowpassAngle(yawOffset, target, 1 - Math.exp(-dt / tau));
        }
      }
      compassPrev = { v: ch, t: tNow };
    }
    if (yawOffset === null) return; // まだ北の基準が取れていない

    var heading = (azRel + yawOffset + 360) % 360;
    orient.heading = lowpassAngle(orient.heading, heading, 0.35);
    orient.pitch = (orient.pitch === null) ? alt : orient.pitch + (alt - orient.pitch) * 0.35;
  }

  function resizeAR(){
    var dpr = window.devicePixelRatio || 1;
    arCanvas.width = Math.round(arView.clientWidth * dpr);
    arCanvas.height = Math.round(arView.clientHeight * dpr);
    arCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  function roundedRect(x, y, w, h, r){
    arCtx.beginPath();
    arCtx.moveTo(x + r, y);
    arCtx.arcTo(x + w, y, x + w, y + h, r);
    arCtx.arcTo(x + w, y + h, x, y + h, r);
    arCtx.arcTo(x, y + h, x, y, r);
    arCtx.arcTo(x, y, x + w, y, r);
    arCtx.closePath();
  }

  function arLabel(x, y, text, accent){
    arCtx.font = '600 12px -apple-system, "Noto Sans JP", sans-serif';
    var tw = arCtx.measureText(text).width;
    roundedRect(x - tw/2 - 8, y - 30, tw + 16, 21, 10);
    arCtx.fillStyle = 'rgba(17,18,22,.78)';
    arCtx.fill();
    arCtx.fillStyle = accent || '#F4F5F7';
    arCtx.textAlign = 'center';
    arCtx.textBaseline = 'middle';
    arCtx.fillText(text, x, y - 19);
  }

  function drawAR(){
    var w = arView.clientWidth, h = arView.clientHeight;

    // 画面回転などでCSS上のサイズとキャンバスの内部解像度がずれると、古い描画が消えずに
    // 残ったまま重なって見える。resize/orientationchangeイベントに頼らず、毎フレーム
    // 実サイズと突き合わせて必要なら描き直す（＝イベントの取りこぼしに強くする）。
    var dpr = window.devicePixelRatio || 1;
    if (arCanvas.width !== Math.round(w * dpr) || arCanvas.height !== Math.round(h * dpr)){
      resizeAR();
    }
    arCtx.clearRect(0, 0, w, h);

    // 軌跡の投影は縦持ち（ポートレート）のカメラ視野角を前提にした近似のため、
    // 横向きのままでは太陽の位置が正しく合わない。横向き中は描画せず案内だけ出す。
    if (w > h){
      arRotateNotice.hidden = false;
      arStatus.textContent = '';
      return;
    }
    arRotateNotice.hidden = true;

    if (orient.heading === null){
      arStatus.textContent = 'コンパス待機中…（端末を8の字に動かすと改善します）';
      return;
    }
    var vfov = AR_VFOV, hfov = vfov * (w / h);
    var pitch = (orient.pitch === null) ? 0 : orient.pitch;

    function project(az, alt){
      var dAz = ((az - orient.heading + 540) % 360) - 180;
      var dx = dAz * Math.cos(alt * Math.PI / 180); // 高度が高いほど方位1°の見かけ幅は狭い
      var dAlt = alt - pitch;
      return {
        x: w/2 + dx / hfov * w,
        y: h/2 - dAlt / vfov * h,
        on: Math.abs(dx) < hfov * 0.8 && Math.abs(dAlt) < vfov * 0.8
      };
    }

    // 選択日の軌跡線（5分刻み）。地図と同じ暖色グラデーション（朝=ピンク→昼=クリーム→夕=オレンジ）
    arCtx.beginPath();
    var pen = false;
    for (var m = 0; m < 1440; m += 5){
      var d = new Date(state.date); d.setHours(0, m, 0, 0);
      var s = sunAt(d);
      if (s.altitude <= -1){ pen = false; continue; }
      var p = project(s.azimuth, s.altitude);
      if (!p.on){ pen = false; continue; }
      if (pen) arCtx.lineTo(p.x, p.y); else { arCtx.moveTo(p.x, p.y); pen = true; }
    }
    var lineGrad = arCtx.createLinearGradient(0, 0, w, 0);
    FRAC_COLOR_STOPS.forEach(function(st){ lineGrad.addColorStop(st[0], st[1]); });
    arCtx.strokeStyle = lineGrad;
    arCtx.lineWidth = 2;
    arCtx.stroke();

    // 30分刻みの時刻マーカー。地図の時刻アイコンと同じく時間帯ごとの暖色
    for (var mm = 0; mm < 1440; mm += 30){
      var md = new Date(state.date); md.setHours(0, mm, 0, 0);
      var ms = sunAt(md);
      if (ms.altitude <= 0) continue;
      var mp = project(ms.azimuth, ms.altitude);
      if (!mp.on) continue;
      var mcol = hourColorAt(md.getHours() + md.getMinutes() / 60);
      arCtx.beginPath();
      arCtx.arc(mp.x, mp.y, 5.5, 0, Math.PI * 2);
      arCtx.fillStyle = mcol;
      arCtx.fill();
      arCtx.lineWidth = 1.5;
      arCtx.strokeStyle = 'rgba(255,255,255,.9)';
      arCtx.stroke();
      arLabel(mp.x, mp.y, ('0'+md.getHours()).slice(-2) + ':' + ('0'+md.getMinutes()).slice(-2));
    }

    // 現在の太陽（実際の今）。地図の太陽アイコンと同じく光条付き
    var now = new Date();
    var ns = sunAt(now);
    if (ns.altitude > -1){
      var np = project(ns.azimuth, ns.altitude);
      if (np.on){
        var g = arCtx.createRadialGradient(np.x, np.y, 2, np.x, np.y, 30);
        g.addColorStop(0, 'rgba(74,222,128,.65)');
        g.addColorStop(1, 'rgba(74,222,128,0)');
        arCtx.fillStyle = g;
        arCtx.beginPath(); arCtx.arc(np.x, np.y, 30, 0, Math.PI * 2); arCtx.fill();
        arCtx.strokeStyle = 'rgba(74,222,128,.9)'; arCtx.lineWidth = 1.8; arCtx.lineCap = 'round';
        for (var ray = 0; ray < 8; ray++){
          var ra = ray * Math.PI / 4;
          arCtx.beginPath();
          arCtx.moveTo(np.x + Math.cos(ra) * 12, np.y + Math.sin(ra) * 12);
          arCtx.lineTo(np.x + Math.cos(ra) * 18, np.y + Math.sin(ra) * 18);
          arCtx.stroke();
        }
        arCtx.beginPath(); arCtx.arc(np.x, np.y, 9, 0, Math.PI * 2);
        arCtx.fillStyle = '#6CFFA0'; arCtx.fill();
        arCtx.lineWidth = 2.5; arCtx.strokeStyle = '#fff'; arCtx.stroke();
        arLabel(np.x, np.y - 22, '現在 ' + fmtTime(now), '#4ADE80');
      }
    }

    arStatus.textContent =
      (state.date.getMonth()+1) + '/' + state.date.getDate() +
      ' ・ 方位 ' + Math.round(orient.heading) + '° ・ 仰角 ' + Math.round(pitch) + '°';
  }

  function arLoop(){
    if (!arActive) return;
    drawAR();
    requestAnimationFrame(arLoop);
  }

  function enterAR(){
    var orientReady;
    if (window.DeviceOrientationEvent && typeof DeviceOrientationEvent.requestPermission === 'function'){
      // iOS 13+: ユーザー操作内での明示許可が必須
      orientReady = DeviceOrientationEvent.requestPermission().then(function(r){
        if (r !== 'granted') throw new Error('orientation-denied');
      });
    } else {
      orientReady = Promise.resolve();
    }
    orientReady.then(function(){
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) throw new Error('no-camera');
      return navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false });
    }).then(function(stream){
      arStream = stream;
      arVideo.srcObject = stream;
      arVideo.play().catch(function(){});
      arView.hidden = false;
      arActive = true;
      orient.heading = null; orient.pitch = null; hasAbsolute = false;
      yawOffset = null; compassPrev = null; yawLockTime = 0; arStartTime = performance.now();
      window.addEventListener('deviceorientationabsolute', onOrient);
      window.addEventListener('deviceorientation', onOrient);
      resizeAR();
      requestAnimationFrame(arLoop);
    }).catch(function(err){
      var msg = 'カメラを起動できませんでした';
      if (err && err.message === 'orientation-denied') msg = '方位センサーの利用が許可されませんでした';
      else if (err && err.message === 'no-camera') msg = 'この端末ではカメラを利用できません';
      else if (err && (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError')) msg = 'カメラの利用が許可されませんでした';
      toast(msg);
    });
  }

  function exitAR(){
    arActive = false;
    arView.hidden = true;
    window.removeEventListener('deviceorientationabsolute', onOrient);
    window.removeEventListener('deviceorientation', onOrient);
    if (arStream){
      arStream.getTracks().forEach(function(t){ t.stop(); });
      arStream = null;
    }
    arVideo.srcObject = null;
  }

  // 磁気干渉などでコンパスの基準がずれて見えるとき、北の基準を取り直す。
  // 端末を8の字に振ってからタップすると精度の良いサンプルを拾いやすい。
  function recalibrateAR(){
    orient.heading = null; orient.pitch = null; hasAbsolute = false;
    yawOffset = null; compassPrev = null; yawLockTime = 0; arStartTime = performance.now();
    arStatus.textContent = 'コンパス待機中…（端末を8の字に動かすと改善します）';
    toast('コンパスを再調整しています…');
  }

  document.getElementById('arBtn').addEventListener('click', enterAR);
  document.getElementById('arExitBtn').addEventListener('click', exitAR);
  document.getElementById('arRecalBtn').addEventListener('click', function(){
    this.classList.remove('spin'); void this.offsetWidth; this.classList.add('spin');
    recalibrateAR();
  });
  window.addEventListener('resize', function(){ if (arActive) resizeAR(); });

  // ---------- 下部UIの位置補正（iOS Safariのツールバー対策） ----------
  // CSSのlvh/svh計算では持ち上げ量が不足する端末があるため、
  // visualViewportで「実際に見えている領域の下端」を測ってその上に配置する。
  var sheetEl = document.querySelector('.sheet');
  var sabProbe;
  function safeAreaBottom(){
    if (!sabProbe){
      sabProbe = document.createElement('div');
      sabProbe.style.cssText = 'position:fixed;bottom:0;left:0;width:0;height:env(safe-area-inset-bottom);pointer-events:none;visibility:hidden;';
      document.body.appendChild(sabProbe);
    }
    return sabProbe.offsetHeight;
  }
  function fitBottomUI(){
    var vv = window.visualViewport;
    if (!vv) return;
    var visBottom = vv.offsetTop + vv.height; // レイアウトビューポート座標系での可視領域下端
    var banner = window.__bannerHeight || 0;
    if (banner > 0){
      // 広告バナーはホームインジケータのセーフエリア上に出るため、バナー高さ＋セーフエリア分を持ち上げる
      visBottom -= (banner + safeAreaBottom());
    }
    sheetEl.style.bottom = 'auto';
    sheetEl.style.top = Math.round(visBottom - sheetEl.offsetHeight - 12) + 'px';
    arStatus.style.bottom = 'auto';
    arStatus.style.top = Math.round(visBottom - arStatus.offsetHeight - 14) + 'px';
  }
  window.__refitBottomUI = fitBottomUI;  // native.js（広告バナー）から呼べるように公開
  if (window.visualViewport){
    window.visualViewport.addEventListener('resize', fitBottomUI);
    window.visualViewport.addEventListener('scroll', fitBottomUI);
    window.addEventListener('orientationchange', function(){ setTimeout(fitBottomUI, 300); });
    fitBottomUI();
    setTimeout(fitBottomUI, 300);  // フォント読み込み等でパネル高さが確定した後にもう一度
    setTimeout(fitBottomUI, 1200);
  }

  // ---------- 起動 ----------
  setDate(new Date());
  setInterval(function(){    // 現在の太陽・タイムコード・バーのプレイヘッド位置を毎分更新（再アニメはしない）
    drawNow();
    updateClock();
    if (state.date.toDateString() === new Date().toDateString()){
      document.getElementById('deckPlayhead').style.left = pctOfDay(new Date()) + '%';
    }
  }, 60000);

  // 起動時に現在地を取得して中心に置く（許可された場合）。拒否・取得失敗時は既定/保存位置のまま。
  geoGetCurrent(
    function(pos){
      updateLocMarker(pos.coords.latitude, pos.coords.longitude, pos.coords.accuracy);
      setObserver(pos.coords.latitude, pos.coords.longitude, true); // 現在地へ移動
      startLocWatch();  // 以降は移動に追従して青ドットを更新
    },
    function(){ /* 許可なし/取得失敗 → 既定または保存済みの位置のまま */ }
  );

  // ---------- PWA: Service Worker 登録（ネイティブアプリでは不要） ----------
  if (!window.Capacitor && 'serviceWorker' in navigator &&
      (location.protocol === 'https:' || location.hostname === 'localhost' || location.hostname === '127.0.0.1')){
    navigator.serviceWorker.register('sw.js').catch(function(){ /* 登録失敗時もアプリは動作する */ });
  }

  // ---------- ネイティブアプリ（Capacitor）でのみ広告・課金処理を読み込む ----------
  if (window.Capacitor){
    var ns = document.createElement('script');
    ns.src = 'native.js';
    document.body.appendChild(ns);
  }
})();
</script>
</body>
</html>
